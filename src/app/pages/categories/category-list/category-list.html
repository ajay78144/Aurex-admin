<div class="page-header">

    <h1>Categories</h1>

    <button routerLink="/categories/add">
        Add Category
    </button>

</div>

<div class="table-container">

    <table>

        <thead>

            <tr>

                <th>Name</th>
                <th>Description</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let category of categories">

                <td>{{category.name}}</td>

                <td>{{category.description}}</td>

                <td class="action-buttons">

                    <button
                        class="edit-btn"
                        [routerLink]="['/categories/edit', category._id]">
                        Edit
                    </button>

                    <button
                        class="delete-btn"
                        (click)="deleteCategory(category._id)">
                        Delete
                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>
