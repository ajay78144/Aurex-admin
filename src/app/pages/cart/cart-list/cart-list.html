<div class="page-header">

    <h1>Cart Items</h1>

</div>

<div class="table-container">

    <table>

        <thead>

            <tr>

                <th>Customer</th>
                <th>Email</th>
                <th>Product Image</th>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Added On</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let cart of carts">

                <td>{{ cart.user?.name }}</td>

                <td>{{ cart.user?.email }}</td>

                <td>

                    <img
                        [src]="cart.product?.image"
                        [alt]="cart.product?.name"
                        class="product-image"
                    >

                </td>

                <td>{{ cart.product?.name }}</td>

                <td>₹{{ cart.product?.price }}</td>

                <td>{{ cart.quantity }}</td>

                <td>

                    ₹{{ cart.product?.price * cart.quantity }}

                </td>

                <td>

                    {{ cart.createdAt | date:'dd/MM/yyyy' }}

                </td>

                <td>

                    <button
                        class="delete-btn"
                        (click)="deleteCart(cart._id)"
                    >
                        Delete
                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>
