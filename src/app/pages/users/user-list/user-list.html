<div class="page-header">

    <h1>Users</h1>

</div>

<div class="table-container">

    <table>

        <thead>

            <tr>

                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Created</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let user of users">

                <td>{{ user.name }}</td>

                <td>{{ user.email }}</td>

                <td>

                    <span
                        class="role-badge"
                        [ngClass]="user.role === 'admin'
                        ? 'admin-role'
                        : 'customer-role'">

                        {{ user.role }}

                    </span>

                </td>

                <td>

                    {{ user.createdAt | date:'dd/MM/yyyy' }}

                </td>

                <td class="action-buttons">

                    <button
                        class="role-btn"
                        (click)="changeRole(user)"
                    >

                        {{ user.role === 'admin'
                        ? 'Make Customer'
                        : 'Make Admin'
                        }}

                    </button>

                    <button
                        class="delete-btn"
                        (click)="deleteUser(user._id)"
                    >

                        Delete

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>
