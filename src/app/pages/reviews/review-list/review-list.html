<div class="page-header">

    <h1>Reviews</h1>

</div>

<div class="table-container">

    <table>

        <thead>

            <tr>

                <th>User</th>
                <th>Product</th>
                <th>Rating</th>
                <th>Comment</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let review of reviews">

                <td>{{review.user?.name}}</td>

                <td>{{review.product?.name}}</td>

                <td>{{review.rating}}</td>

                <td>{{review.comment}}</td>

                <td>

                    <button
                        class="delete-btn"
                        (click)="deleteReview(review._id)"
                    >
                        Delete
                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>
