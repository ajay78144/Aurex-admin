<div class="login-container">

    <div class="login-box">

        <div class="logo">
            Aurex
        </div>

        <p class="subtitle">
            Admin Dashboard Login
        </p>

        <div class="form-group">
            <label>Email</label>
            <input
                type="email"
                placeholder="Enter Email"
                [(ngModel)]="email"
            >
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                placeholder="Enter Password"
                [(ngModel)]="password"
            >
        </div>

        <button
            class="login-btn"
            (click)="login()"
        >
            Login
        </button>

    </div>

</div>
